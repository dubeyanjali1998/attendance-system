<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="text-align:center; font-family: Arial;">

<h2 id="result">Scan your ID</h2>

<div id="reader" style="width:300px; margin:auto;"></div>

<div id="actions" style="display:none; margin-top:20px;">
  <button onclick="submitAction('IN')">Clock In</button>
  <button onclick="submitAction('OUT')">Clock Out</button>
  <button onclick="rescan()">Re-Scan</button>
</div>

<script>
let empId = "";
let html5QrCode = new Html5Qrcode("reader");

// ✅ Scan success
function onScanSuccess(decodedText) {
  empId = extractId(decodedText);

  if (!empId || empId === "NOT FOUND") {
    alert("Invalid QR Code");
    return;
  }

  document.getElementById("result").innerText = "ID: " + empId;
  document.getElementById("actions").style.display = "block";

  html5QrCode.stop();
}

// ✅ Extract ID from QR text
function extractId(text) {
  let match = text.match(/ID[:\s]*([A-Za-z0-9]+)/i);

  if (match) {
    return match[1].trim();
  }

  // fallback: return full text if pattern fails
  return text.trim();
}

// ✅ Send data to backend
function submitAction(action) {
  fetch("https://script.google.com/macros/s/AKfycbztlqAQlemb25DAv78w1y4f5uxRq5KzBkGVdEBEIWMYFC8WHF8__tAvx7dxza0GGiWpIw/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      empId: empId,
      action: action
    })
  });

  // ✅ Immediate feedback
  alert("Recorded: " + action + " for ID: " + empId);

  // ✅ Reset for next user
  setTimeout(rescan, 800);
}

// ✅ Reset scanner
function rescan() {
  document.getElementById("actions").style.display = "none";
  document.getElementById("result").innerText = "Scan your ID";

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess
  );
}

// ✅ Start scanner initially
html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: { width: 250, height: 250 } },
  onScanSuccess
);

</script>

</body>
</html>
