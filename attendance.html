<!DOCTYPE html>
<html>
<head>
  <title>Attendance</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h2 id="result">Scan your ID</h2>

<div id="reader" style="width:300px;"></div>

<div id="actions" style="display:none;">
  <button onclick="submitAction('IN')">Clock In</button>
  <button onclick="submitAction('OUT')">Clock Out</button>
  <button onclick="rescan()">Re-Scan</button>
</div>

<script>
let empId = "";

// Scan success
function onScanSuccess(decodedText) {
  empId = extractId(decodedText);

  document.getElementById("result").innerText = "ID: " + empId;
  document.getElementById("actions").style.display = "block";

  html5QrCode.stop();
}

// Extract ID from QR
function extractId(text) {
  let match = text.match(/ID[:\s]*([0-9]+)/i);
  return match ? match[1] : text;
}

// Send data
function submitAction(action) {
  fetch("https://script.google.com/macros/s/AKfycbwpuadFX-K8elyS8c0wck8c7oyVnm-I16b1YGVna0j70zrx6MxtptUD939OzTtPKJYT0A/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    empId: empId,
    action: action
  })
})
  .then(res => res.text())
  .then(data => {
    alert("Recorded: " + action);
    rescan();
  })
  .catch(err => alert("Error: " + err));
}

// Reset scanner
function rescan() {
  document.getElementById("actions").style.display = "none";
  document.getElementById("result").innerText = "Scan your ID";

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess
  );
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: { width: 250, height: 250 } },
  onScanSuccess
);

</script>

</body>
</html>
